name: CI

on:
  push:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        pip install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest
      run: |
        pip install pytest
        pytest || echo "No tests found or tests failed"

    - name: Run the app (smoke test)
      run: |
        # Assuming app.py is the main file
        python app.py &
        APP_PID=$!
        sleep 5
        # Check homepage
        curl -f http://localhost:4567 || (echo "App failed to start" && exit 1)
        
        # Test URL shortening
        echo "Testing URL shortening..."
        RESPONSE=$(curl -s -X POST -d "url=https://www.example.com" http://localhost:4567/shorten)
        SHORT_URL=$(echo "$RESPONSE" | grep -o 'http://localhost:4567/[a-zA-Z0-9]*' | head -1)
        
        if [ -n "$SHORT_URL" ]; then
          echo "✅ Successfully shortened URL!"
          echo "Shortened URL: $SHORT_URL"
          echo "Test redirect..."
          REDIRECT_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SHORT_URL")
          if [ "$REDIRECT_STATUS" = "302" ] || [ "$REDIRECT_STATUS" = "301" ]; then
            echo "✅ Redirect works correctly"
          else
            echo "❌ Redirect failed" && exit 1
          fi
        else
          echo "❌ URL shortening failed" && exit 1
        fi
        
        kill $APP_PID
